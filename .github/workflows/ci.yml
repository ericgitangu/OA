name: CI

on:
  push:
    branches: [zen, main]
  pull_request:
    branches: [zen, main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: python -m py_compile tier_0_python/dsa/**/*.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        working-directory: tier_1_systems/rust
        run: cargo check

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build C++
        working-directory: tier_1_systems/cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
